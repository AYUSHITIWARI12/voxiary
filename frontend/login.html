<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voxiary | Login</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="auth-body">

<nav class="auth-nav">

  <strong>Voxiary</strong>
</nav>

<div class="auth-container">
  <h2 id="title">Welcome to Voxiary</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="confirmPassword" type="password" placeholder="Confirm Password" style="display:none;">


  <button class="primary-btn" onclick="handleLogin()">Continue</button>

  <div class="divider">OR</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<div id="g_id_onload"
     data-client_id="669910826119-u8mpa72p2dfdgonahvi76bm646k8pjej.apps.googleusercontent.com"
     data-callback="handleGoogleLogin">
</div>

<div class="g_id_signin" data-theme="outline" data-size="large"></div>


  <p class="muted">
    New here?
    <span onclick="switchToSignup()">Create an account</span>
  </p>

  <p id="msg" class="msg"></p>
</div>

<script src="js/auth.js"></script>

<script>
function switchToSignup() {
  document.getElementById("title").innerText = "Create Account";
  document.querySelector(".primary-btn").innerText = "Sign Up";
  document.querySelector(".primary-btn").onclick = handleSignup;
  document.getElementById("confirmPassword").style.display = "block";
  document.querySelector(".muted").innerHTML =
    `Already have an account?
     <span onclick="switchToLogin()">Login</span>`;
}

function switchToLogin() {
  document.getElementById("title").innerText = "Welcome Back";
  document.querySelector(".primary-btn").innerText = "Continue";
  document.querySelector(".primary-btn").onclick = handleLogin;
  document.getElementById("confirmPassword").style.display = "none";
  document.querySelector(".muted").innerHTML =
    `New here?
     <span onclick="switchToSignup()">Create an account</span>`;
}

function handleSignup() { signup(); }
function handleLogin() { login(); }
</script>

</body>
</html>
